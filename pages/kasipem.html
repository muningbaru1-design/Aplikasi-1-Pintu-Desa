<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasi Pemerintahan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="../css/style.css">

<style>

body{
    margin:0;
    background:#eef2f7;
    font-family:'Poppins',sans-serif;
}

/*========================
HEADER
========================*/

.header{

    background:white;

    height:90px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 25px;

    box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.menu-btn{

    background:none;

    border:none;

    font-size:25px;

    cursor:pointer;

}

.title{

    text-align:center;

}

.title h2{

    margin:0;

    font-size:36px;

}

.title p{

    margin:0;

    color:#555;

}

.logo-desa{

    width:60px;

}

/*========================
RAK BUKU
========================*/

.rak-header{

    padding:30px 20px 10px;

    text-align:center;

}

.rak-header h2{

    color:#0f766e;

    margin-bottom:20px;

}

#cariBuku{

    width:100%;

    max-width:450px;

    padding:14px;

    border-radius:12px;

    border:1px solid #ddd;

    font-size:16px;

}

#gridMenu{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:30px;

    padding:30px;

    align-items:end;

}

.rak{

    grid-column:1/-1;

    height:18px;

    background:#7b4f25;

    border-radius:10px;

    box-shadow:0 6px 10px rgba(0,0,0,.25);

}

</style>

</head>

<body>

<header class="header">

<button class="menu-btn" onclick="history.back()">
<i class="bi bi-arrow-left"></i>
</button>

<div class="title">

<h2>Kasi Pemerintahan</h2>

<p>Administrasi Penduduk</p>

</div>

<img src="../assets/logo/logo-desa.png" class="logo-desa">

</header>

<section class="rak-header">

<h2>📚 Rak Buku Administrasi Penduduk</h2>

<input
type="text"
id="cariBuku"
placeholder="🔍 Cari Buku Administrasi...">

</section>

<section id="gridMenu">

</section>

<div class="rak"></div>

<script src="../js/config.js"></script>

<script src="../js/administrasi/renderMenu.js"></script>

<script>

renderMenu("penduduk","gridMenu");

</script>

</body>

</html>
