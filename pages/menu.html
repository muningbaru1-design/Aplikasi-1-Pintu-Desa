<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Administrasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="header">

<button class="menu-btn" onclick="history.back()">
<i class="bi bi-arrow-left"></i>
</button>

<div class="title">

<h2 id="judulMenu"></h2>

<p id="subJudul"></p>

</div>

<img src="../assets/logo/logo-desa.png" class="logo-desa">

</header>

<section class="rak-header">

<h2 id="judulRak"></h2>

<input
type="text"
id="cariBuku"
placeholder="🔍 Cari Buku...">

</section>

<section id="gridMenu" class="rak-buku">

</section>

<script src="../js/config.js"></script>

<script src="../js/administrasi/renderMenu.js"></script>

<script>

const kategori = new URLSearchParams(window.location.search).get("kategori");

if(KATEGORI[kategori]){

document.getElementById("judulMenu").textContent =
KATEGORI[kategori].judul;

document.getElementById("subJudul").textContent =
KATEGORI[kategori].subjudul;

document.getElementById("judulRak").textContent =
KATEGORI[kategori].rak;

renderMenu(kategori,"gridMenu");

}else{

document.getElementById("judulMenu").textContent="Kategori Tidak Ditemukan";

}

</script>

</body>

</html>
