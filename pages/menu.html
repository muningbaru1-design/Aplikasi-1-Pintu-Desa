<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Administrasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="header">

    <button class="menu-btn" onclick="history.back()">
        <i class="bi bi-arrow-left"></i>
    </button>

    <div class="title">
        <h2 id="judulMenu"></h2>
        <p id="subJudul"></p>
    </div>

    <!-- Tombol Portal -->
<button class="btn-sidebar" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
    <span>Portal</span>
</button>

    <img src="../assets/logo/logo-desa.jpg" class="logo-desa">

</header>

<section class="rak-header">

<h2 id="judulRak"></h2>


</section>

<!-- Buku -->
<section id="gridMenu" class="rak-buku"></section>

<!-- Overlay -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">

        <h3>🌐 Portal Desa</h3>

        <button onclick="toggleSidebar()">
            <i class="bi bi-x-lg"></i>
        </button>

    </div>

    <div id="sidebarMenu"></div>

</div>
<script src="../js/config.js"></script>
<script>
console.log("KATEGORI =", typeof KATEGORI);
console.log("MENU =", typeof MENU);
console.log("PORTAL =", typeof PORTAL);
</script>

<script src="../js/administrasi/renderMenu.js"></script>

<script>

const kategori = new URLSearchParams(window.location.search).get("kategori");

if(KATEGORI[kategori]){

    document.getElementById("judulMenu").textContent =
    KATEGORI[kategori].judul;

    document.getElementById("subJudul").textContent =
    KATEGORI[kategori].subjudul;

    document.getElementById("judulRak").textContent =
    KATEGORI[kategori].rak;

    renderMenu(kategori,"gridMenu");

    const sidebar = document.getElementById("sidebarMenu");

    sidebar.innerHTML = "";

    if(PORTAL[kategori]){

        PORTAL[kategori].forEach(app=>{

            sidebar.innerHTML += `

            <div class="sidebar-item"
            onclick="window.open('${app.link}','_blank')">

                <i class="bi ${app.icon}"></i>

                <span>${app.nama}</span>

                <i class="bi bi-chevron-right"></i>

            </div>

            `;

        });

    }

}else{

    document.getElementById("judulMenu").textContent =
    "Kategori Tidak Ditemukan";

}

function toggleSidebar(){

    document.getElementById("sidebar").classList.toggle("active");

    document.getElementById("overlay").classList.toggle("active");

}

</script>


</body>

</html>
