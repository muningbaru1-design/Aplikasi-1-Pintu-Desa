<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload SPJ</title>


    <!-- FONT POPPINS -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">


    <!-- BOOTSTRAP ICONS -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <!-- CSS UTAMA -->

    <link rel="stylesheet"
          href="../css/style.css">


    <style>


        /* =========================
           HALAMAN SPJ
        ========================= */

        .spj-page {

            padding: 30px;

        }


        /* =========================
           JUDUL
        ========================= */

        .spj-title {

            text-align: center;

            margin-bottom: 30px;

        }


        .spj-title h2 {

            margin-bottom: 6px;

        }


        .spj-title p {

            color: #777;

            font-size: 14px;

        }


        /* =========================
           GRID 4 HORIZONTAL
        ========================= */

        .spj-container {

            display: grid;

            grid-template-columns:
            repeat(4, 1fr);

            gap: 20px;

            max-width: 1400px;

            margin: auto;

        }


        /* =========================
           KARTU
        ========================= */

        .spj-card {

            background: white;

            border-radius: 15px;

            padding: 25px 15px;

            text-align: center;

            box-shadow:
            0 4px 15px
            rgba(0,0,0,0.08);

            transition: 0.3s;

        }


        .spj-card:hover {

            transform:
            translateY(-5px);

            box-shadow:
            0 8px 25px
            rgba(0,0,0,0.15);

        }


        /* =========================
           ICON
        ========================= */

        .spj-icon {

            width: 85px;

            height: 85px;

            margin: auto;

            margin-bottom: 15px;

            border-radius: 50%;

            display: flex;

            align-items: center;

            justify-content: center;

            background: #EFF6FF;

            border: 3px solid #BFDBFE;

        }


        .spj-icon i {

            font-size: 42px;

            color: #2563EB;

        }


        /* =========================
           JUDUL KARTU
        ========================= */

        .spj-card h3 {

            font-size: 15px;

            margin-bottom: 18px;

            min-height: 45px;

        }


        /* =========================
           TOMBOL
        ========================= */

        .spj-btn {

            border: none;

            color: white;

            padding: 10px 15px;

            border-radius: 7px;

            cursor: pointer;

            font-family: Poppins;

            font-size: 12px;

            transition: 0.2s;

        }


        .spj-btn:hover {

            transform:
            scale(1.03);

        }


        .btn-spj {

            background: #2563EB;

        }


        .spj-btn i {

            margin-right: 5px;

        }


        /* =========================
           TABLET
        ========================= */

        @media(max-width: 1000px) {

            .spj-container {

                grid-template-columns:
                repeat(2, 1fr);

            }

        }


        /* =========================
           HP
        ========================= */

        @media(max-width: 600px) {

            .spj-page {

                padding: 20px 12px;

            }


            .spj-container {

                grid-template-columns: 1fr;

            }

        }


    </style>

</head>


<body>


    <!-- HEADER -->

    <header class="header">


        <!-- TOMBOL KEMBALI -->

        <button class="menu-btn"
                onclick="history.back()">

            <i class="bi bi-arrow-left"></i>

        </button>


        <!-- JUDUL -->

        <div class="title">

            <h2>Upload SPJ</h2>

            <p>Dokumen Pertanggungjawaban Kegiatan Desa</p>

        </div>


        <!-- LOGO -->

        <img src="../assets/logo/logo-desa.jpg"
             class="logo-desa">

    </header>


    <!-- KONTEN -->

    <main class="spj-page">


        <div class="spj-title">


            <h2>

                SPJ PELAKSANA KEGIATAN

            </h2>


            <p>

                Pilih pelaksana kegiatan untuk membuka folder SPJ

            </p>


        </div>


        <!-- 4 KARTU -->

        <div class="spj-container">


            <!-- KASI PEMERINTAHAN -->

            <div class="spj-card">


                <div class="spj-icon">

                    <i class="bi bi-person-badge-fill"></i>

                </div>


                <h3>

                    SPJ PELAKSANA KEGIATAN

                    <br>

                    KASI PEMERINTAHAN

                </h3>


                <button class="spj-btn btn-spj"

                        onclick="window.open(

                        'https://drive.google.com/drive/folders/1c9VyNys4ZowtExndZ3ATHhvcROjiKRNK?usp=drive_link',

                        '_blank'

                        )">


                    <i class="bi bi-folder2-open"></i>

                    Buka Folder Google Drive


                </button>


            </div>


            <!-- KASI PELAYANAN -->

            <div class="spj-card">


                <div class="spj-icon">

                    <i class="bi bi-person-badge-fill"></i>

                </div>


                <h3>

                    SPJ PELAKSANA KEGIATAN

                    <br>

                    KASI PELAYANAN

                </h3>


                <button class="spj-btn btn-spj"

                        onclick="window.open(

                        'https://drive.google.com/drive/folders/1IvOW2YwiHB2MqVqHSDmclPZHJXh6oMB7?usp=drive_link',

                        '_blank'

                        )">


                    <i class="bi bi-folder2-open"></i>

                    Buka Folder Google Drive


                </button>


            </div>


            <!-- KAUR UMUM & PERENCANAAN -->

            <div class="spj-card">


                <div class="spj-icon">

                    <i class="bi bi-person-badge-fill"></i>

                </div>


                <h3>

                    SPJ PELAKSANA KEGIATAN

                    <br>

                    KAUR UMUM & PERENCANAAN

                </h3>


                <button class="spj-btn btn-spj"

                        onclick="window.open(

                        'https://drive.google.com/drive/folders/13xxO8IlWIf9ZmrrqvrOJcXdUTj5jXpU-?usp=drive_link',

                        '_blank'

                        )">


                    <i class="bi bi-folder2-open"></i>

                    Buka Folder Google Drive


                </button>


            </div>


            <!-- KAUR KEUANGAN -->

            <div class="spj-card">


                <div class="spj-icon">

                    <i class="bi bi-person-badge-fill"></i>

                </div>


                <h3>

                    SPJ PELAKSANA KEGIATAN

                    <br>

                    KAUR KEUANGAN

                </h3>


                <button class="spj-btn btn-spj"

                        onclick="window.open(

                        'https://drive.google.com/drive/folders/1vBNffhbdsdRtTMfPI5eh2_IEJtIn56by?usp=drive_link',

                        '_blank'

                        )">


                    <i class="bi bi-folder2-open"></i>

                    Buka Folder Google Drive


                </button>


            </div>


        </div>


    </main>


</body>

</html>
